<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PriceDrop Alert | Track & Save Smartly</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080b18;
      --bg2: #0d1128;
      --purple: #7c3aed;
      --purple-light: #a855f7;
      --pink: #ec4899;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --card: #111827;
      --border: rgba(255,255,255,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* NAVBAR */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      background: rgba(8,11,24,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }

    .nav-links { display: flex; align-items: center; gap: 1rem; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.9rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    .btn-login {
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: white; border: none; padding: 0.5rem 1.2rem;
      border-radius: 8px; font-size: 0.9rem; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.85; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem 3rem;
      position: relative;
      overflow: hidden;
    }

    /* Background glow */
    .hero::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -60%);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, transparent 70%);
      bottom: 10%; right: -10%;
      pointer-events: none;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      color: var(--purple-light); padding: 0.4rem 1rem;
      border-radius: 999px; font-size: 0.8rem;
      margin-bottom: 1.5rem;
