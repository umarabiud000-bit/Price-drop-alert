<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceDrop Alert | Track & Save</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="p-6 bg-white shadow-sm flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600">PriceDrop Tracker</h1>
        <div class="space-x-4">
            <a href="#" class="text-gray-600 hover:text-blue-600">Home</a>
            <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Login</a>
        </div>
    </nav>

    <section class="max-w-4xl mx-auto mt-20 text-center">
        <h2 class="text-4xl font-extrabold text-gray-800 mb-4">Paste Product Link & Track Price</h2>
        <p class="text-gray-500 mb-8">Hum aapko email bhejenge jaise hi price niche girega.</p>
        
        <div class="flex gap-2">
            <input type="text" placeholder="Paste Amazon/Flipkart link here..." class="w-full p-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-700 transition">Track</button>
        </div>
    </section>

    <section class="max-w-4xl mx-auto mt-12 grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white p-4 rounded-2xl shadow-md flex items-center gap-4">
            <img src="https://via.placeholder.com/100" alt="product" class="rounded-lg">
            <div>
                <h3 class="font-bold text-gray-800">iPhone 15 Pro</h3>
                <p class="text-sm text-gray-500">Current: <span class="text-green-600 font-bold">₹1,20,000</span></p>
                <p class="text-xs text-red-500">Lowest ever: ₹1,15,000</p>
                <button class="mt-2 text-xs bg-gray-100 px-3 py-1 rounded-md">Set Alert</button>
            </div>
        </div>
    </section>

</body>
</html>
